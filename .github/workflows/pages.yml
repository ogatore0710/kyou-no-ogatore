name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 配信に必要なファイルだけをallowlist方式で集める(WORKING_NOTES等の内部ドキュメント・scripts/の非公開データを誤って公開しないため)
        run: |
          mkdir -p _site
          cp index.html manifest.json sw.js CNAME .nojekyll robots.txt _site/
          cp videos.js app-search.js app-quiz.js app-record.js app-card.js app-env.js obu-feed.js soudan-kb.js _site/
          cp -r assets _site/assets
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
